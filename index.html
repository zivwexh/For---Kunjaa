<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Kunjaa 💜</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap');
    body {margin:0; min-height:100vh; background:linear-gradient(-45deg,#a18cd1,#fbc2eb,#c2b6ff,#e0c3fc); background-size:400% 400%; animation:gradient 10s ease infinite; display:flex; justify-content:center; align-items:center; font-family:'Playfair Display',serif;}
    .box {text-align:center; padding:20px;}
    h1,p {color:white; text-shadow:0 0 20px rgba(255,255,255,0.7); opacity:0; animation:slideUp 1.5s ease forwards;}
    h1 {font-size:36px; margin-bottom:40px; animation-delay:0.5s;}
    p {font-size:22px; line-height:2.2; font-style:italic; margin:20px 0;}
    p:nth-of-type(1){animation-delay:2s;} p:nth-of-type(2){animation-delay:3.5s;} p:nth-of-type(3){animation-delay:5s;} p:nth-of-type(4){animation-delay:6.5s;}
    .heart {font-size:50px; opacity:0; animation:fadeIn 1s ease 8s forwards,pulse 1.5s infinite 8s;}
    @keyframes gradient{0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}}
    @keyframes slideUp{from{opacity:0; transform:translateY(40px)} to{opacity:1; transform:translateY(0)}}
    @keyframes fadeIn{to{opacity:1}} @keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.2)}}
  </style>
</head>
<body>
  <div class="box">
    <h1>To My Kunjaa 💜</h1>
    <p>You are my moments of gold</p>
    <p>Every second with you feels like magic</p>
    <p>In this purple sky of dreams,<br>You're the only star I see</p>
    <p>Always yours,<br><b>Sivanii</b> 💜</p>
    <div class="heart">💜</div>
  </div>
</body>
    </html>
